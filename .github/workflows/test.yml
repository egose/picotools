name: Test

on:
  pull_request:
    paths-ignore:
    - '**.md'
  push:
    paths-ignore:
    - '**.md'

jobs:
  unit-test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Setup Tools
      uses: ./.github/actions/setup-tools

    - name: Run unit tests
      run: |
        bats tests/*.bats

  install-test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Validate Bash Scripts
      run: |
        bash -n bin/* tools/bin/* scripts/*.bash

    - name: Smoke Test Install Layout
      run: |
        set -euo pipefail

        chmod +x bin/* tools/bin/*
        mkdir -p dist tmp/download tmp/install
        tar -czf dist/picotools-test.tar.gz -C . VERSION lib -C tools bin
        cp dist/picotools-test.tar.gz tmp/download/

        ASDF_INSTALL_TYPE=version \
        ASDF_INSTALL_VERSION=test \
        ASDF_INSTALL_PATH="$PWD/tmp/install" \
        ASDF_DOWNLOAD_PATH="$PWD/tmp/download" \
          bin/install

        test -f "$PWD/tmp/install/VERSION"
        test "$(cat "$PWD/tmp/install/VERSION")" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/asdf-install" --help >/dev/null
        test "$("$PWD/tmp/install/bin/asdf-install" --version)" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/asdf-clean-unused" --help >/dev/null
        test "$("$PWD/tmp/install/bin/asdf-clean-unused" --version)" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/pip-upgrade" --help >/dev/null
        test "$("$PWD/tmp/install/bin/pip-upgrade" --version)" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/gh-repo-sync" --help >/dev/null
        test "$("$PWD/tmp/install/bin/gh-repo-sync" --version)" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/git-clean-branches" --help >/dev/null
        test "$("$PWD/tmp/install/bin/git-clean-branches" --version)" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/git-clean-task-pr" --help >/dev/null
        test "$("$PWD/tmp/install/bin/git-clean-task-pr" --version)" = "$(cat VERSION)"

        "$PWD/tmp/install/bin/oc-quota-requests" --help >/dev/null
        test "$("$PWD/tmp/install/bin/oc-quota-requests" --version)" = "$(cat VERSION)"

    - name: Functional Test pip-upgrade scopes
      run: |
        set -euo pipefail

        tmp_dir=$(mktemp -d)
        trap 'rm -rf "$tmp_dir"' EXIT

        mkdir -p "$tmp_dir/bin"
        cat > "$tmp_dir/bin/curl" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        case "$*" in
          *"/requests/json"*)
            cat <<'JSON'
        {"releases":{"2.31.0":[{"yanked":false}],"2.31.1":[{"yanked":false}],"2.32.0":[{"yanked":false}],"3.0.0":[{"yanked":false}],"3.1.0rc1":[{"yanked":false}]}}
        JSON
            ;;
          *"/urllib3/json"*)
            cat <<'JSON'
        {"releases":{"2.2.0":[{"yanked":false}],"2.2.1":[{"yanked":false}],"2.3.0":[{"yanked":false}],"3.0.0":[{"yanked":false}]}}
        JSON
            ;;
          *)
            exit 1
            ;;
        esac
        EOF
        chmod +x "$tmp_dir/bin/curl"

        cat > "$tmp_dir/requirements.txt" <<'EOF'
        requests==2.31.0
        urllib3==2.2.0 # keep comment
        rich>=13.0
        EOF

        if output=$(printf 'n\n' | PATH="$tmp_dir/bin:$PATH" ./tools/bin/pip-upgrade --scope patch "$tmp_dir/requirements.txt" 2>&1); then
          printf '%s\n' "$output" >&2
          exit 1
        fi
        case "$output" in
          *"Proceed with updating $tmp_dir/requirements.txt? [y/N]:"*"Cancelled."*)
            ;;
          *)
            printf '%s\n' "$output" >&2
            exit 1
            ;;
        esac
        grep -Fx 'requests==2.31.0' "$tmp_dir/requirements.txt"
        grep -Fx 'urllib3==2.2.0 # keep comment' "$tmp_dir/requirements.txt"

        PATH="$tmp_dir/bin:$PATH" ./tools/bin/pip-upgrade --yes --scope patch "$tmp_dir/requirements.txt"
        grep -Fx 'requests==2.31.1' "$tmp_dir/requirements.txt"
        grep -Fx 'urllib3==2.2.1 # keep comment' "$tmp_dir/requirements.txt"
        grep -Fx 'rich>=13.0' "$tmp_dir/requirements.txt"

        cat > "$tmp_dir/requirements.txt" <<'EOF'
        requests==2.31.0
        urllib3==2.2.0
        EOF

        PATH="$tmp_dir/bin:$PATH" ./tools/bin/pip-upgrade --yes --scope minor "$tmp_dir/requirements.txt"
        grep -Fx 'requests==2.32.0' "$tmp_dir/requirements.txt"
        grep -Fx 'urllib3==2.3.0' "$tmp_dir/requirements.txt"

        cat > "$tmp_dir/requirements.txt" <<'EOF'
        requests==2.31.0
        EOF

        PATH="$tmp_dir/bin:$PATH" ./tools/bin/pip-upgrade --yes --scope major "$tmp_dir/requirements.txt"
        grep -Fx 'requests==3.0.0' "$tmp_dir/requirements.txt"

    - name: Functional Test git-clean-task-pr no editor
      run: |
        set -euo pipefail

        repo_root=$PWD
        tmp_dir=$(mktemp -d)
        trap 'rm -rf "$tmp_dir"' EXIT

        git init --bare "$tmp_dir/remote.git"
        git clone "$tmp_dir/remote.git" "$tmp_dir/work"
        git clone "$tmp_dir/remote.git" "$tmp_dir/task"

        git -C "$tmp_dir/work" checkout -b main
        git -C "$tmp_dir/work" -c user.name=Test -c user.email=test@example.com commit --allow-empty -m init
        git -C "$tmp_dir/work" push -u origin main

        git -C "$tmp_dir/task" fetch origin main
        git -C "$tmp_dir/task" checkout -b feat origin/main
        git -C "$tmp_dir/task" -c user.name=Test -c user.email=test@example.com commit --allow-empty -m feat

        git -C "$tmp_dir/work" -c user.name=Test -c user.email=test@example.com commit --allow-empty -m base
        git -C "$tmp_dir/work" push

        cat > "$tmp_dir/editor" <<'EOF'
        #!/usr/bin/env bash
        exit 99
        EOF
        chmod +x "$tmp_dir/editor"

        (
          cd "$tmp_dir/task"
          GIT_MERGE_AUTOEDIT=yes \
          GIT_EDITOR="$tmp_dir/editor" \
          GIT_COMMITTER_NAME=Test \
          GIT_COMMITTER_EMAIL=test@example.com \
          GIT_AUTHOR_NAME=Test \
          GIT_AUTHOR_EMAIL=test@example.com \
            bash "$repo_root/tools/bin/git-clean-task-pr" --branch feat-1 main
        )

        test "$(git -C "$tmp_dir/task" branch --show-current)" = 'feat-1'
        test ! -f "$(git -C "$tmp_dir/task" rev-parse --git-path MERGE_HEAD)"

    - name: Functional Test git-clean-task-pr refreshes remote head
      run: |
        set -euo pipefail

        repo_root=$PWD
        tmp_dir=$(mktemp -d)
        trap 'rm -rf "$tmp_dir"' EXIT

        real_git=$(command -v git)

        git init --bare "$tmp_dir/remote.git"
        git clone "$tmp_dir/remote.git" "$tmp_dir/work"
        git clone "$tmp_dir/remote.git" "$tmp_dir/task"

        git -C "$tmp_dir/work" checkout -b main
        git -C "$tmp_dir/work" -c user.name=Test -c user.email=test@example.com commit --allow-empty -m init
        git -C "$tmp_dir/work" push -u origin main
        git -C "$tmp_dir/task" fetch origin main
        git -C "$tmp_dir/task" checkout -b feat origin/main

        mkdir -p "$tmp_dir/bin"
        cat > "$tmp_dir/bin/git" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        if [ "$#" -ge 4 ] && [ "$1" = remote ] && [ "$2" = set-head ] && [ "$3" = origin ] && [ "$4" = --auto ]; then
          : > "$SET_HEAD_MARKER"
        fi

        exec "$REAL_GIT" "$@"
        EOF
        chmod +x "$tmp_dir/bin/git"

        (
          cd "$tmp_dir/task"
          PATH="$tmp_dir/bin:$PATH" \
          REAL_GIT="$real_git" \
          SET_HEAD_MARKER="$tmp_dir/set-head-called" \
            bash "$repo_root/tools/bin/git-clean-task-pr" --branch feat-1
        )

        test -f "$tmp_dir/set-head-called"
        test "$(git -C "$tmp_dir/task" branch --show-current)" = 'feat-1'

    - name: Functional Test git-clean-task-pr falls back to main
      run: |
        set -euo pipefail

        repo_root=$PWD
        tmp_dir=$(mktemp -d)
        trap 'rm -rf "$tmp_dir"' EXIT

        real_git=$(command -v git)

        git init --bare "$tmp_dir/remote.git"
        git clone "$tmp_dir/remote.git" "$tmp_dir/work"
        git clone "$tmp_dir/remote.git" "$tmp_dir/task"

        git -C "$tmp_dir/work" checkout -b main
        git -C "$tmp_dir/work" -c user.name=Test -c user.email=test@example.com commit --allow-empty -m init
        git -C "$tmp_dir/work" push -u origin main
        git -C "$tmp_dir/task" fetch origin main
        git -C "$tmp_dir/task" checkout -b feat origin/main

        mkdir -p "$tmp_dir/bin"
        cat > "$tmp_dir/bin/git" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        if [ "$#" -ge 4 ] && [ "$1" = remote ] && [ "$2" = set-head ] && [ "$3" = origin ] && [ "$4" = --auto ]; then
          exit 1
        fi

        if [ "$#" -ge 4 ] && [ "$1" = symbolic-ref ] && [ "$2" = --quiet ] && [ "$3" = --short ] && [ "$4" = refs/remotes/origin/HEAD ]; then
          exit 1
        fi

        if [ "$#" -ge 4 ] && [ "$1" = remote ] && [ "$2" = show ] && [ "$3" = -n ] && [ "$4" = origin ]; then
          printf '%s\n' '* remote origin' '  HEAD branch: (not queried)'
          exit 0
        fi

        if [ "$#" -ge 3 ] && [ "$1" = remote ] && [ "$2" = show ] && [ "$3" = origin ]; then
          echo 'unexpected networked git remote show invocation' >&2
          exit 88
        fi

        exec "$REAL_GIT" "$@"
        EOF
        chmod +x "$tmp_dir/bin/git"

        (
          cd "$tmp_dir/task"
          PATH="$tmp_dir/bin:$PATH" \
          REAL_GIT="$real_git" \
            bash "$repo_root/tools/bin/git-clean-task-pr" --branch feat-1
        )

        test "$(git -C "$tmp_dir/task" branch --show-current)" = 'feat-1'
